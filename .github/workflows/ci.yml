name: Python CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-forbidden-folders:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v6

    - name: Check for forbidden folders in PR
      run: |
        echo "Checking for forbidden folders in pull request..."

        # Function to check for folder existence case-insensitively
        check_forbidden_folder() {
          local pattern="$1"
          local description="$2"

          # Use find with case-insensitive matching
          if find . -type d -ipath "*${pattern}*" -print -quit | grep -q .; then
            echo "❌ ERROR: Found forbidden folder matching '${pattern}'"
            echo "Description: ${description}"
            find . -type d -ipath "*${pattern}*" | sed 's/^/ Found: /'
            return 1
          else
            echo "✅ No forbidden folder found for pattern: ${pattern}"
            return 0
          fi
        }

        # Check for forbidden folders
        ERROR=0

        check_forbidden_folder "pr_info" "Temporary development folder (planning, tracking, review logs)" || ERROR=1

        if [ $ERROR -eq 1 ]; then
          echo ""
          echo "❌ PULL REQUEST BLOCKED: Forbidden folders detected!"
          echo "These folders should not be included in pull requests."
          echo "Please remove them and update your .gitignore if necessary."
          echo "Note: These folders are allowed in regular commits, just not in PRs."
          exit 1
        else
          echo ""
          echo "✅ All checks passed! No forbidden folders found."
        fi

  # Matrix approach: Each check runs as independent job with individual pass/fail status
  # fail-fast: false ensures all checks complete even if one fails
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "black", cmd: "black --version && black --check src tests"}
          - {name: "isort", cmd: "isort --version && isort --check --profile=black --float-to-top src tests"}
          - {name: "pylint", cmd: "pylint --version && pylint -E ./src ./tests"}
          - {name: "ruff-docstrings", cmd: "ruff version && ruff check src"}
          - {name: "pytest", cmd: "pytest --version && pytest tests -n auto -m 'not sqlite_integration and not mssql_integration and not postgresql_integration'"}
          - {name: "mypy", cmd: "mypy --version && mypy --strict src tests"}
    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}

  # SQLite integration tests (always available, no service container needed)
  sqlite-integration:
    runs-on: ubuntu-latest
    name: sqlite-integration
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Run SQLite integration tests
        run: |
          rc=0; pytest tests -m sqlite_integration -v || rc=$?
          if [ $rc -eq 5 ]; then echo "No tests collected — skipping"; exit 0; fi
          exit $rc

  # PostgreSQL integration tests
  postgresql-integration:
    runs-on: ubuntu-latest
    name: postgresql-integration
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser -d testdb"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install --system ".[dev,postgresql]"

      - name: Run PostgreSQL integration tests
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: 5432
          TEST_PG_USER: testuser
          TEST_PG_PASSWORD: testpass
          TEST_PG_DB: testdb
        run: |
          rc=0; pytest tests -m postgresql_integration -v || rc=$?
          if [ $rc -eq 5 ]; then echo "No tests collected — skipping"; exit 0; fi
          exit $rc

  # MSSQL integration tests (best-effort)
  mssql-integration:
    runs-on: ubuntu-latest
    name: mssql-integration
    continue-on-error: true
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "TestPass123!"
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'TestPass123!' -C -Q 'SELECT 1'"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=10
          --health-start-period=30s
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 unixodbc-dev

      - name: Install dependencies
        run: uv pip install --system ".[dev,mssql]"

      - name: Run MSSQL integration tests
        env:
          TEST_MSSQL_HOST: localhost
          TEST_MSSQL_PORT: 1433
          TEST_MSSQL_USER: sa
          TEST_MSSQL_PASSWORD: "TestPass123!"
        run: |
          rc=0; pytest tests -m mssql_integration -v || rc=$?
          if [ $rc -eq 5 ]; then echo "No tests collected — skipping"; exit 0; fi
          exit $rc

  # Architecture and code quality checks (PR only)
  architecture:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        check:
          - {name: "import-linter", cmd: "lint-imports --help > /dev/null && lint-imports"}
          - {name: "tach", cmd: "tach --version && tach check"}
          - {name: "vulture", cmd: "vulture --version && vulture src tests vulture_whitelist.py --min-confidence 60"}
    name: ${{ matrix.check.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Environment info
        run: |
          uname -a
          python --version
          uv --version
          git --version

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.cmd }}
